/* ============================================================

:root{
  --bg-primary:#0A0A0A;
  --bg-secondary:#111111;
  --bg-card:#181818;
  --bg-card-hover:#1E1E1E;
  --bg-elevated:#202020;
  --accent:#00E5FF;
  --accent-dim:#00B8CC;
  --accent2:#00FF88;
  --warning:#FFB800;
  --danger:#FF4D4D;
  --success:#00C853;
  --text-primary:#FFFFFF;
  --text-secondary:#A0A0A0;
  --text-tertiary:#666666;
  --border:#262626;
  --border-soft:#1C1C1C;
 
  --font-display: -apple-system, "SF Pro Display", "Inter", system-ui, sans-serif;
  --font-body: -apple-system, "SF Pro Text", "Inter", system-ui, sans-serif;
  --font-mono: "SF Mono", "JetBrains Mono", monospace;
 
  --radius-sm:8px;
  --radius-md:12px;
  --radius-lg:18px;
  --radius-xl:24px;
 
  --shadow-card: 0 1px 0 rgba(255,255,255,0.03) inset, 0 8px 24px rgba(0,0,0,0.4);
  --shadow-glow-cyan: 0 0 0 1px rgba(0,229,255,0.15), 0 0 24px rgba(0,229,255,0.08);
  --shadow-glow-green: 0 0 0 1px rgba(0,255,136,0.15), 0 0 24px rgba(0,255,136,0.08);
 
  --ease: cubic-bezier(.16,.84,.44,1);
  --t-fast: 150ms var(--ease);
  --t-med: 280ms var(--ease);
  --t-slow: 450ms var(--ease);
}

  font-family:var(--font-body);
  font-size:15px;
  line-height:1.5;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  max-width:100vw;
}
::selection{background:rgba(0,229,255,0.25);}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--bg-primary);}
::-webkit-scrollbar-thumb{background:#2A2A2A;border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:#3A3A3A;}
 
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;color:inherit;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
 
@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}
}
 
/* ============================================================
   LAYOUT SHELL
   ============================================================ */
.app-shell{
  display:grid;
  grid-template-columns:248px 1fr;
  min-height:100vh;
}
 
/* SIDEBAR */
.sidebar{
  background:var(--bg-secondary);
  border-right:1px solid var(--border-soft);
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0;left:0;bottom:0;
  width:248px;
  z-index:100;
  transition:transform var(--t-med);
}
.sidebar-brand{
  padding:28px 24px 20px;
  display:flex;
  align-items:center;
  gap:10px;
}
.brand-mark{
  width:38px;height:38px;
  border-radius:50%;
  background:#0A0A0A;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  overflow:hidden;
  border:1px solid rgba(255,184,0,0.35);
}
.brand-mark img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}
.brand-text{display:flex;flex-direction:column;}
.brand-title{font-size:14px;font-weight:700;letter-spacing:0.2px;}
.brand-sub{font-size:10.5px;color:var(--text-tertiary);letter-spacing:0.4px;text-transform:uppercase;margin-top:1px;}
 
.sidebar-nav{
  flex:1;
  padding:8px 12px;
  overflow-y:auto;
}
.nav-group-label{
  font-size:10.5px;
  font-weight:600;
  color:var(--text-tertiary);
  text-transform:uppercase;
  letter-spacing:0.6px;
  padding:16px 12px 8px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 12px;
  border-radius:var(--radius-sm);
  color:var(--text-secondary);
  font-size:13.5px;
  font-weight:500;
  cursor:pointer;
  transition:background var(--t-fast), color var(--t-fast);
  margin-bottom:2px;
  position:relative;
}
.nav-item:hover{background:var(--bg-card);color:var(--text-primary);}
.nav-item.active{background:var(--bg-card);color:var(--text-primary);}
.nav-item.active::before{
  content:'';
  position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:18px;border-radius:2px;
  background:var(--accent);
}
.nav-icon{width:17px;height:17px;flex-shrink:0;opacity:0.85;}
.nav-item.active .nav-icon{opacity:1;}
 
.sidebar-footer{
  padding:16px;
  border-top:1px solid var(--border-soft);
}
.streak-pill{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg-card);
  border-radius:var(--radius-md);
  padding:10px 12px;
  font-size:12px;
}
.streak-pill .label{color:var(--text-secondary);}
.streak-pill .value{font-weight:700;color:var(--accent2);font-family:var(--font-mono);}
 
/* MAIN */
.main{
  grid-column:2;
  margin-left:248px;
  min-height:100vh;
  width:calc(100% - 248px);
}
.topbar{
  position:sticky;top:0;z-index:50;
  background:rgba(10,10,10,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border-soft);
  padding:16px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}
.topbar-title{font-size:18px;font-weight:700;letter-spacing:-0.2px;}
.topbar-actions{display:flex;align-items:center;gap:10px;}
.menu-toggle{display:none;}
 
.page{
  padding:32px;
  max-width:1400px;
  animation:fadeUp var(--t-slow);
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
.page-section{display:none;}
.page-section.active{display:block;}
 
/* ============================================================
   SHARED COMPONENTS
   ============================================================ */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:10px 16px;
  border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;
  transition:all var(--t-fast);
  white-space:nowrap;
}
.btn-primary{background:var(--accent);color:#04161A;}
.btn-primary:hover{background:#33ECFF;box-shadow:var(--shadow-glow-cyan);transform:translateY(-1px);}
.btn-secondary{background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--bg-card-hover);border-color:#3A3A3A;}
.btn-ghost{color:var(--text-secondary);padding:8px 10px;}
.btn-ghost:hover{color:var(--text-primary);background:var(--bg-card);}
.btn-danger{background:rgba(255,77,77,0.12);color:var(--danger);}
.btn-danger:hover{background:rgba(255,77,77,0.2);}
.btn-success{background:rgba(0,200,83,0.12);color:var(--success);}
.btn-success:hover{background:rgba(0,200,83,0.2);}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
 
.card{
  background:var(--bg-card);
  border:1px solid var(--border-soft);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card);
}
.card-pad{padding:22px;}
 
.section-title{
  font-size:22px;font-weight:700;letter-spacing:-0.3px;margin-bottom:4px;
}
.section-sub{color:var(--text-secondary);font-size:13.5px;margin-bottom:24px;}
 
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
 
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:0.2px;
}
.badge-cyan{background:rgba(0,229,255,0.12);color:var(--accent);}
.badge-green{background:rgba(0,255,136,0.12);color:var(--accent2);}
.badge-warning{background:rgba(255,184,0,0.12);color:var(--warning);}
.badge-danger{background:rgba(255,77,77,0.12);color:var(--danger);}
.badge-gray{background:rgba(255,255,255,0.06);color:var(--text-secondary);}

/* ============================================================
   LEADERBOARD & LOGIN
   ============================================================ */
.lb-login-card{
  max-width:420px;margin:60px auto;text-align:center;
}
.lb-login-icon{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg, var(--warning), #8a6200);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;margin:0 auto 18px;
}
.lb-google-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:#fff;color:#1F1F1F;
  padding:11px 20px;border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;
  box-shadow:0 1px 2px rgba(0,0,0,0.3);
  margin-top:18px;
}
.lb-google-btn:hover{background:#F3F3F3;}
.lb-google-icon{width:18px;height:18px;flex-shrink:0;}
.lb-setup-note{
  margin-top:22px;padding:14px;border-radius:var(--radius-md);
  background:var(--bg-elevated);font-size:12px;color:var(--text-tertiary);
  text-align:left;line-height:1.6;
}
.lb-setup-note code{
  background:#000;padding:1px 5px;border-radius:4px;color:var(--accent2);font-family:var(--font-mono);
}

.lb-me-card{
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;flex-wrap:wrap;margin-bottom:24px;
}
.lb-me-left{display:flex;align-items:center;gap:14px;}
.lb-avatar{
  width:46px;height:46px;border-radius:50%;
  border:2px solid var(--border);object-fit:cover;flex-shrink:0;
  background:var(--bg-elevated);
}
.lb-me-name{font-weight:700;font-size:15px;}
.lb-me-sub{font-size:12px;color:var(--text-tertiary);}
.lb-me-stats{display:flex;gap:22px;}
.lb-me-stat{text-align:center;}
.lb-me-stat .num{font-size:20px;font-weight:800;font-family:var(--font-mono);}
.lb-me-stat .lbl{font-size:10.5px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.4px;}

.lb-table-wrap{overflow-x:auto;}
.lb-table{width:100%;border-collapse:collapse;font-size:13.5px;}
.lb-table th{
  text-align:left;padding:11px 16px;color:var(--text-tertiary);
  font-size:11px;text-transform:uppercase;letter-spacing:0.4px;
  border-bottom:1px solid var(--border-soft);
}
.lb-table td{padding:11px 16px;border-bottom:1px solid var(--border-soft);}
.lb-table tr:last-child td{border-bottom:none;}
.lb-table tr.is-me{background:rgba(0,229,255,0.06);}
.lb-rank{
  display:inline-flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:50%;
  font-weight:700;font-size:12px;
  background:var(--bg-elevated);color:var(--text-secondary);
}
.lb-rank.gold{background:rgba(255,184,0,0.18);color:var(--warning);}
.lb-rank.silver{background:rgba(200,200,210,0.18);color:#C8C8D2;}
.lb-rank.bronze{background:rgba(205,127,50,0.2);color:#CD7F32;}
.lb-name-cell{display:flex;align-items:center;gap:10px;}
.lb-name-cell img{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:var(--bg-elevated);}
.lb-empty{padding:40px;text-align:center;color:var(--text-tertiary);font-size:13px;}
 
.progress-track{
  height:7px;border-radius:10px;background:#0D0D0D;
  border:1px solid var(--border-soft);
  overflow:hidden;position:relative;
}
.progress-fill{
  height:100%;border-radius:10px;
  background:linear-gradient(90deg, var(--accent-dim), var(--accent));
  transition:width var(--t-slow);
}
.progress-fill.green{background:linear-gradient(90deg,#00C853,var(--accent2));}
 
input[type="text"], input[type="number"], input[type="search"], textarea, select{
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:9px 12px;
  font-size:13px;
  color:var(--text-primary);
  width:100%;
  transition:border-color var(--t-fast);
}
input::placeholder, textarea::placeholder{color:var(--text-tertiary);}
input:focus, textarea:focus, select:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:70px;line-height:1.5;}
 
.checkbox-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;}
.checkbox-row input[type="checkbox"]{
  appearance:none;width:18px;height:18px;border-radius:5px;
  border:1.5px solid #3A3A3A;background:var(--bg-elevated);
  flex-shrink:0;margin-top:1px;cursor:pointer;position:relative;
  transition:all var(--t-fast);
}
.checkbox-row input[type="checkbox"]:checked{
  background:var(--accent2);border-color:var(--accent2);
}
.checkbox-row input[type="checkbox"]:checked::after{
  content:'';position:absolute;left:5px;top:1px;width:5px;height:9px;
  border:solid #04220F;border-width:0 2px 2px 0;transform:rotate(45deg);
}
.checkbox-row label{font-size:13.5px;color:var(--text-primary);cursor:pointer;line-height:1.45;}
.checkbox-row.done label{color:var(--text-tertiary);text-decoration:line-through;}
 
.tooltip-label{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:block;}
 
.empty-state{
  text-align:center;padding:60px 20px;color:var(--text-secondary);
}
.empty-state svg{opacity:0.3;margin-bottom:12px;}
 
.toast-container{
  position:fixed;bottom:24px;right:24px;z-index:1000;
  display:flex;flex-direction:column;gap:8px;
}
.toast{
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-left:3px solid var(--accent2);
  padding:12px 18px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
  animation:toastIn var(--t-med);
  min-width:200px;
}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
@keyframes toastOut{from{opacity:1;}to{opacity:0;transform:translateX(20px);}}
 
.modal-card{
  background:var(--bg-secondary);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  box-shadow:0 30px 80px rgba(0,0,0,0.6);
}
 
/* Responsive */
@media (max-width: 1024px){
  .grid-4{grid-template-columns:repeat(2,1fr);}
  .grid-3{grid-template-columns:repeat(2,1fr);}
}
@media (max-width: 768px){
  .app-shell{grid-template-columns:1fr;}
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);box-shadow:20px 0 60px rgba(0,0,0,0.6);}
  .main{grid-column:1;margin-left:0;width:100%;}
  .menu-toggle{display:flex;}
  .grid-2, .grid-3, .grid-4{grid-template-columns:1fr;}
  .page{padding:18px;}
  .topbar{padding:14px 18px;}
}

function defaultState(){
  return {

}
 
let STATE = loadState();
 
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const def = defaultState();
    return Object.assign(def, parsed, {
      days: Object.assign({}, parsed.days||{}),
      projects: Object.assign({}, parsed.projects||{}),
      knowledge: Object.assign({}, parsed.knowledge||{}),
      strategy: Object.assign({}, parsed.strategy||{}),
      visionBoard: Object.assign(def.visionBoard, parsed.visionBoard||{}),
      settings: Object.assign(def.settings, parsed.settings||{}),
    });
  }catch(e){
    console.error('Failed to load state', e);
    return defaultState();
  }
}

function el(tag, attrs, children){
  const e = document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k === 'class') e.className = attrs[k];
    else if(k === 'html') e.innerHTML = attrs[k];
    else if(k.startsWith('on') && typeof attrs[k]==='function') e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  if(children) (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    if(typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  });
  return e;
}
function esc(str){
  return String(str==null?'':str).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function toast(msg, isError){
  const c = document.getElementById('toastContainer');
  const t = el('div', {class:'toast'}, msg);
  if(isError) t.style.borderLeftColor = 'var(--danger)';
  c.appendChild(t);
  setTimeout(()=>{
    t.style.animation = 'toastOut 200ms ease forwards';
    setTimeout(()=>t.remove(), 200);
  }, 2400);
}
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function pct(num, den){ return den<=0 ? 0 : Math.round((num/den)*100); }
 
function dateForDay(dayNum){
  const d = new Date(STATE.startDate + 'T00:00:00');
  d.setDate(d.getDate() + (dayNum - 1));
  return d;
}
function formatDate(d){
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}
function currentDayNumber(){
  const start = new Date(STATE.startDate + 'T00:00:00');
  const diff = Math.floor((TODAY_REF - start) / 86400000) + 1;
  return clamp(diff, 1, 180);
}
 
function getProjectById(id){ return PROJECTS_DATA.find(p=>p.id===id); }
function getDay(num){ return DAYS_DATA.find(d=>d.day===num); }
function daysForProject(id){ return DAYS_DATA.filter(d=>d.project===id); }
 
function dayCompletionPct(dayNum){
  const day = getDay(dayNum);
  const ds = getDayState(dayNum);
  if(ds.status === 'complete') return 100;
  const totalTasks = (day.tasks?.length||0) + (day.practice?.length||0);
  if(totalTasks===0) return ds.status==='complete' ? 100 : 0;
  let checked = 0;
  for(let i=0;i<totalTasks;i++) if(ds.tasksChecked[i]) checked++;
  return pct(checked, totalTasks);
}
function isDayComplete(dayNum){
  const ds = STATE.days[dayNum];
  return !!ds && ds.status === 'complete';
}
function projectCompletionPct(projId){
  const days = daysForProject(projId);
  if(!days.length) return 0;
  const done = days.filter(d=>isDayComplete(d.day)).length;
  return pct(done, days.length);
}
function overallCompletionPct(){
  const done = DAYS_DATA.filter(d=>isDayComplete(d.day)).length;
  return pct(done, 180);
}
function daysCompletedCount(){
  return DAYS_DATA.filter(d=>isDayComplete(d.day)).length;
}
 
function computeStreaks(){
  // daily streak: consecutive days ending at the most recent completed day (by day number, sequential)
  const completedSet = new Set(DAYS_DATA.filter(d=>isDayComplete(d.day)).map(d=>d.day));
  let current = currentDayNumber();
  let streak = 0;
  // walk backward from current day while completed
  for(let d = current; d>=1; d--){
    if(completedSet.has(d)) streak++;
    else break;
  }
  // longest streak overall
  let longest = 0, run = 0;
  for(let d=1; d<=180; d++){
    if(completedSet.has(d)){ run++; longest = Math.max(longest, run); }
    else run = 0;
  }
  return { current: streak, longest };
}

function navigateTo(page, opts){
  opts = opts || {};

function buildProgressCircle(pct){
  const size=170, stroke=12, r=(size-stroke)/2, c=2*Math.PI*r;

  wrap.innerHTML = `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1A1A1A" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#gradCircle)" stroke-width="${stroke}"
        stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset 700ms cubic-bezier(.16,.84,.44,1);"/>
      <defs><linearGradient id="gradCircle" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#00FF88"/>

    </svg>
    <div class="progress-circle-label">
      <div class="pcl-pct">${pct}%</div>
      <div class="pcl-sub">Complete</div>
    </div>`;
  return wrap;
}
 
function weeklyStreakCount(){
  // count weeks (of 7 days) fully completed so far
  let weeks=0;
  for(let w=0; w<26; w++){
    const start=w*7+1, end=start+6;
    let allDone=true;
    for(let d=start; d<=end && d<=180; d++){ if(!isDayComplete(d)){ allDone=false; break; } }
    if(allDone && start<=180) weeks++;
  }
  return weeks;
}
function monthlyConsistencyPct(){
  const cur = currentDayNumber();
  const monthStart = Math.max(1, cur-29);
  let total=0, done=0;
  for(let d=monthStart; d<=cur; d++){ total++; if(isDayComplete(d)) done++; }
  return pct(done,total);
}

function renderDayGrid(gridRoot){
  gridRoot.innerHTML='';
  const q = execFilter.search.trim().toLowerCase();
  const today = currentDayNumber();
 
  let days = DAYS_DATA.filter(d=>{
    if(execFilter.project!=='all' && String(d.project)!==String(execFilter.project)) return false;
    if(execFilter.week!=='all'){
      const w = Math.ceil(d.day/7);
      if(String(w)!==String(execFilter.week)) return false;
    }
    if(q){
      if(!(String(d.day).includes(q) || d.topic.toLowerCase().includes(q))) return false;
    }
    return true;
  });
 
  if(days.length===0){
    gridRoot.appendChild(el('div',{class:'empty-state'}, 'No days match your filters.'));
    return;
  }
 
  days.forEach(d=>{
    const compPct = dayCompletionPct(d.day);
    const complete = isDayComplete(d.day);
    const isToday = d.day===today;
    const cell = el('div',{class:'day-cell'+(complete?' complete':'')+(isToday?' today':'')});
    cell.appendChild(el('div',{class:'day-cell-num'}, d.day));
    cell.appendChild(el('div',{class:'day-cell-topic'}, d.topic));
    cell.appendChild(el('div',{class:'progress-track', style:'height:4px;margin-top:8px;'}, el('div',{class:'progress-fill'+(complete?' green':''), style:'width:'+compPct+'%'})));
    cell.addEventListener('click', ()=> openDayModal(d.day));
    gridRoot.appendChild(cell);
  });
}

  modal.appendChild(footer);
 
  root.appendChild(overlay);
  document.body.style.overflow='hidden';
 
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeDayModal(); });

function contentBlock(title, items){

function taskChecklistBlock(title, items, ds, startIdx){
  const block = el('div',{class:'day-subcard'});
  block.appendChild(el('span',{class:'tooltip-label'}, title));
  items.forEach((item,i)=>{
    const idx = startIdx+i;
    const row = el('div',{class:'checkbox-row'+(ds.tasksChecked[idx]?' done':'')});
    const cb = el('input',{type:'checkbox'});
    cb.checked = !!ds.tasksChecked[idx];
    cb.addEventListener('change', ()=>{
      ds.tasksChecked[idx] = cb.checked;
      saveState();
      row.classList.toggle('done', cb.checked);
      renderDayGrid(document.getElementById('dayGrid'));
    });
    row.appendChild(cb);
    row.appendChild(el('label',{}, item));
    block.appendChild(row);
  });
  return block;
}

      row.querySelectorAll('.tracker-emoji-btn').forEach((b,bi)=> b.classList.toggle('active', bi===i));
    });
    row.appendChild(btn);
  });
  wrap.appendChild(row);
  return wrap;
}

function renderKnowledgeGrid(gridRoot){
  gridRoot.innerHTML='';
  const q = knowledgeFilter.search.trim().toLowerCase();
  let skills = KNOWLEDGE_DATA.filter(k=>{
    const ks = getKnowledgeState(k.id);
    if(knowledgeFilter.onlyFav && !ks.favorite) return false;
    if(knowledgeFilter.onlyBookmarked && !ks.bookmarked) return false;
    if(q && !(k.name.toLowerCase().includes(q) || k.whatToKnow.join(' ').toLowerCase().includes(q))) return false;
    return true;
  });
  if(skills.length===0){
    gridRoot.appendChild(el('div',{class:'empty-state', style:'grid-column:1/-1;'}, 'No knowledge cards match your filters.'));
    return;
  }
  skills.forEach(k=> gridRoot.appendChild(buildKnowledgeCard(k)));
}
 
function buildKnowledgeCard(k){
  const ks = getKnowledgeState(k.id);
  const isExpanded = expandedKnowledge.has(k.id);
  const doneCount = Object.values(ks.completed).filter(Boolean).length;
  const cPct = pct(doneCount, k.whatToKnow.length);
 
  const card = el('div',{class:'card knowledge-card'});
  const head = el('div',{class:'kv-card-head'});
  head.appendChild(el('div',{class:'proj-card-num'}, '#'+k.id));
  head.appendChild(el('div',{class:'kv-card-name', style:'flex:1;'}, k.name));
 
  const favBtn = el('button',{class:'btn-ghost', style:'font-size:16px;color:'+(ks.favorite?'var(--warning)':'var(--text-tertiary)')}, ks.favorite?'★':'☆');
  favBtn.addEventListener('click', ()=>{ ks.favorite=!ks.favorite; saveState(); renderKnowledgeGrid(document.getElementById('knowledgeGrid')); });
  head.appendChild(favBtn);
 
  const bmBtn = el('button',{class:'btn-ghost', style:'font-size:15px;color:'+(ks.bookmarked?'var(--accent)':'var(--text-tertiary)')}, '🔖');
  bmBtn.addEventListener('click', ()=>{ ks.bookmarked=!ks.bookmarked; saveState(); renderKnowledgeGrid(document.getElementById('knowledgeGrid')); });
  head.appendChild(bmBtn);
  card.appendChild(head);
 
  card.appendChild(el('div',{class:'progress-track', style:'margin:10px 0 4px;'}, el('div',{class:'progress-fill', style:'width:'+cPct+'%'})));
  card.appendChild(el('div',{style:'font-size:11.5px;color:var(--text-tertiary);font-family:var(--font-mono);'}, cPct+'% internalized'));
 
  const expandBtn = el('button',{class:'btn btn-secondary btn-sm', style:'margin-top:12px;width:100%;justify-content:center;'}, isExpanded?'Collapse':'Expand Knowledge Card');
  expandBtn.addEventListener('click', ()=>{
    if(isExpanded) expandedKnowledge.delete(k.id); else expandedKnowledge.add(k.id);
    renderKnowledgeGrid(document.getElementById('knowledgeGrid'));
  });
  card.appendChild(expandBtn);
 
  if(isExpanded){
    const detail = el('div',{class:'kv-detail'});
    detail.appendChild(el('span',{class:'tooltip-label'}, 'What to Know'));
    k.whatToKnow.forEach((item,i)=>{
      const row = el('div',{class:'checkbox-row'+(ks.completed[i]?' done':'')});
      const cb = el('input',{type:'checkbox'});
      cb.checked = !!ks.completed[i];
      cb.addEventListener('change', ()=>{
        ks.completed[i]=cb.checked; saveState();
        row.classList.toggle('done', cb.checked);
        renderKnowledgeGrid(document.getElementById('knowledgeGrid'));
      });
      row.appendChild(cb);
      row.appendChild(el('label',{}, item));
      detail.appendChild(row);
    });
    detail.appendChild(el('span',{class:'tooltip-label', style:'margin-top:12px;'}, 'Benefits When Mastered'));
    const benefitsList = el('ul',{class:'plain-list'});
    k.benefits.forEach(b=> benefitsList.appendChild(el('li',{}, b)));
    detail.appendChild(benefitsList);
    card.appendChild(detail);
  }
 
  return card;
}

function openReviewModal(type){
  const cur = currentDayNumber();
  const span = type==='weekly' ? 7 : 30;
  const start = Math.max(1, cur-span+1);
  let total=0, done=0, totalScore=0, scoreCount=0;
  for(let d=start; d<=cur; d++){
    total++;
    if(isDayComplete(d)) done++;
    const ds = STATE.days[d];
    if(ds && ds.score){ totalScore += ds.score; scoreCount++; }
  }
  const completionPct = pct(done,total);
  const avgScore = scoreCount ? Math.round(totalScore/scoreCount) : 0;
 
  const overlay = el('div',{class:'modal-overlay'});
  const modal = el('div',{class:'modal-card', style:'max-width:480px;padding:28px;'});
  modal.appendChild(el('h2',{style:'font-size:19px;margin-bottom:4px;'}, (type==='weekly'?'Weekly':'Monthly')+' Review'));
  modal.appendChild(el('div',{style:'color:var(--text-tertiary);font-size:12.5px;margin-bottom:20px;'}, 'Days '+start+'–'+cur));
  modal.appendChild(el('div',{class:'grid grid-2', style:'margin-bottom:16px;'},[
    quickStatCard('Completion', completionPct+'%', done+' / '+total+' days', 'cyan'),
    quickStatCard('Avg Score', avgScore, 'across logged days', 'green'),
  ]));
  const closeBtn = el('button',{class:'btn btn-primary', style:'width:100%;justify-content:center;'}, 'Close');
  closeBtn.addEventListener('click', ()=> overlay.remove());
  modal.appendChild(closeBtn);
  overlay.appendChild(modal);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  document.getElementById('dayModalRoot').appendChild(overlay);
}

/* ============================================================
   LEADERBOARD — GOOGLE LOGIN + SHARED COMPETITION RANKING
   ============================================================
   How this works (no paid backend required):
   1. Google Sign-In (free) verifies who the person is.
   2. Their name + completion % + streak get sent to a free
      Google Sheet acting as the shared database (via Apps Script).
   3. Everyone's app reads that same sheet to build the ranked list.

   SETUP REQUIRED BEFORE THIS GOES LIVE:
   - Replace GOOGLE_CLIENT_ID below with your own OAuth Client ID
     from https://console.cloud.google.com/apis/credentials
     (free — choose "OAuth client ID" > "Web application", and add
     the URL where you host this file under "Authorized JavaScript origins").
   - Replace LEADERBOARD_API_URL with your deployed Apps Script Web
     App URL (see apps_script/Code.gs setup instructions).
   Until both are filled in, the page shows setup instructions
   instead of the login button.
   ============================================================ */
const GOOGLE_CLIENT_ID = "721977236787-ai6ois0fsmf34jl5nkeslmjkl7nda5u2.apps.googleusercontent.com";
const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbxVeIlPI3aqrKBNc6SsIWQNg3o2EJv1olt27aQEyMXd4TRfFn0NOAXIYkU6qbaV1NR2Sg/exec";

let LB_DATA = { leaderboard: [], loading:false, error:null };

function lbIsConfigured(){
  return GOOGLE_CLIENT_ID.indexOf('PASTE_') === -1 && LEADERBOARD_API_URL.indexOf('PASTE_') === -1;
}

function decodeJwt_(token){
  try{
    const payload = token.split('.')[1];
    const json = decodeURIComponent(atob(payload.replace(/-/g,'+').replace(/_/g,'/')).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
    return JSON.parse(json);
  }catch(e){ return null; }
}

function handleGoogleCredential_(response){
  const profile = decodeJwt_(response.credential);
  if(!profile) { toast('Sign-in failed — try again', true); return; }
  STATE.leaderboardUser = {
    googleId: profile.sub,
    name: profile.name || profile.email,
    email: profile.email,
    picture: profile.picture || ''
  };
  saveState();
  toast('Signed in as ' + STATE.leaderboardUser.name);
  syncMyLeaderboardRow();
  ensureUserStatusLoaded(true).then(()=> renderPage(CURRENT_PAGE));
}

function lbInitGoogleButton_(){
  if(!window.google || !lbIsConfigured()) return;
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,

async function syncMyLeaderboardRow(){
  if(!lbIsConfigured() || !STATE.leaderboardUser) return;
  const streaks = computeStreaks();
  const body = {
    googleId: STATE.leaderboardUser.googleId,
    name: STATE.leaderboardUser.name,
    email: STATE.leaderboardUser.email,
    completionPct: overallCompletionPct(),
    currentStreak: streaks.current,
    longestStreak: streaks.longest
  };
  try{
    await fetch(LEADERBOARD_API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // avoids CORS preflight on Apps Script
      body: JSON.stringify(body)
    });
  }catch(e){
    console.error('Leaderboard sync failed', e);
  }

async function fetchLeaderboard(){
  if(!lbIsConfigured()) return;
  LB_DATA.loading = true;
  LB_DATA.error = null;
  try{
    const res = await fetch(LEADERBOARD_API_URL, { method:'GET' });
    const json = await res.json();
    if(json.ok) LB_DATA.leaderboard = json.leaderboard || [];
    else LB_DATA.error = json.error || 'Unknown error';
  }catch(e){
    LB_DATA.error = 'Could not reach the leaderboard. Check your connection.';
  }
  LB_DATA.loading = false;
}

function rankBadgeClass(rank){
  if(rank===1) return 'gold';

  if(rank===3) return 'bronze';
  return '';
}

function renderLeaderboardTableOnly_(){
  const root = document.getElementById('sectionLeaderboard');
  if(!root || CURRENT_PAGE!=='leaderboard') return;
  const oldTable = root.querySelector('.lb-table-wrap');
  if(!oldTable) return;
  const tableCard = el('div',{class:'card lb-table-wrap'});
  if(LB_DATA.loading){
    tableCard.appendChild(el('div',{class:'lb-empty'}, 'Loading leaderboard…'));
  } else if(LB_DATA.error){
    tableCard.appendChild(el('div',{class:'lb-empty'}, LB_DATA.error));
  } else if(!LB_DATA.leaderboard.length){
    tableCard.appendChild(el('div',{class:'lb-empty'}, 'No competitors yet — be the first to sync your progress!'));
  } else {
    const table = el('table',{class:'lb-table'});
    table.appendChild(el('tr',{},[
      el('th',{},'Rank'), el('th',{},'Name'), el('th',{},'Completion'),
      el('th',{},'Current Streak'), el('th',{},'Best Streak')
    ]));
    LB_DATA.leaderboard.forEach(row=>{
      const isMe = STATE.leaderboardUser && row.googleId === STATE.leaderboardUser.googleId;
      table.appendChild(el('tr',{class:isMe?'is-me':''},[
        el('td',{}, el('span',{class:'lb-rank '+rankBadgeClass(row.rank)}, row.rank)),
        el('td',{}, el('div',{class:'lb-name-cell'}, row.name + (isMe?' (you)':''))),
        el('td',{}, el('div',{class:'progress-track', style:'width:110px;'}, el('div',{class:'progress-fill'+(row.completionPct===100?' green':''), style:'width:'+row.completionPct+'%'}))),
        el('td',{}, row.currentStreak + (row.currentStreak===1?' day':' days')),
        el('td',{}, row.longestStreak + (row.longestStreak===1?' day':' days')),
      ]));
    });
    tableCard.appendChild(table);
  }
  oldTable.replaceWith(tableCard);
}

/* ============================================================
   PREMIUM — free 30-day trial + Razorpay one-time payment
   ============================================================
   How this works (no paid backend beyond what you already use):
   1. Free plan: only Home, Daily Execution, and Settings are open,
      and only for the first FREE_TRIAL_DAYS days after first sign-in.
   2. Premium: a one-time Razorpay payment (Monthly or Yearly) unlocks
      every page for that many days. Paying again before it runs out
      stacks the remaining time instead of wasting it.
   3. The SAME Apps Script backend from the Leaderboard setup creates
      the Razorpay order and verifies the payment signature — this
      verification step cannot be done safely in the browser alone,
      since it needs your Razorpay secret key.

   SETUP REQUIRED (see apps_script/Code.gs top comment for full steps):
   - A Razorpay account (free to create) with API keys saved as
     Script Properties in your Apps Script project.
   - The same LEADERBOARD_API_URL below also powers premium —
     nothing extra to paste here.
   ============================================================ */
let PREMIUM_STATE = { loaded:false, isPremium:false, trialDaysLeft:30, premiumUntil:null, plan:null };
const RAZORPAY_DISPLAY_PRICES = { monthly: '₹199 / month', yearly: '₹1,499 / year' };

function isPremiumActive(){
  return !!PREMIUM_STATE.isPremium;
}
function isFreeTrialExpired(){
  return PREMIUM_STATE.loaded && PREMIUM_STATE.trialDaysLeft <= 0;
}

async function ensureUserStatusLoaded(force){
  if(!lbIsConfigured() || !STATE.leaderboardUser){
    PREMIUM_STATE = { loaded:true, isPremium:false, trialDaysLeft:30, premiumUntil:null, plan:null };
    return;
  }
  if(PREMIUM_STATE.loaded && !force) return;
  try{
    const res = await fetch(LEADERBOARD_API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'ensureUser', googleId: STATE.leaderboardUser.googleId, email: STATE.leaderboardUser.email })
    });
    const json = await res.json();
    if(json.ok){
      PREMIUM_STATE = {
        loaded:true,
        isPremium: !!json.isPremium,
        trialDaysLeft: typeof json.trialDaysLeft === 'number' ? json.trialDaysLeft : 30,
        premiumUntil: json.premiumUntil || null,
        plan: json.plan || null
      };
    }
  }catch(e){
    console.error('Could not load premium status', e);
    PREMIUM_STATE.loaded = true; // fail open on free trial rather than locking everyone out
  }
  refreshPremiumNavBadge();
}

  const badge = document.getElementById('sidebarStreak');

}

  root.appendChild(el('div',{},[

  ]));

  if(!lbIsConfigured()){
    root.appendChild(buildLeaderboardSetupCard_());
    return;
  }

  if(!STATE.leaderboardUser){
    const card = el('div',{class:'card card-pad lb-login-card'});
    card.appendChild(el('div',{class:'lb-login-icon'}, '🔒'));
    card.appendChild(el('h2',{style:'font-size:20px;margin-bottom:8px;'}, 'Sign In First'));

function buildPlanCard_(plan, label, price, sub){
  const card = el('div',{class:'card card-pad', style:'text-align:center;'});
  card.appendChild(el('div',{style:'font-size:13px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;'}, label));
  card.appendChild(el('div',{style:'font-size:26px;font-weight:800;margin-bottom:6px;'}, price));
  card.appendChild(el('div',{style:'font-size:12.5px;color:var(--text-secondary);margin-bottom:18px;'}, sub));
  const btn = el('button',{class:'btn btn-primary', style:'width:100%;justify-content:center;'}, 'Pay & Unlock');
  btn.addEventListener('click', ()=> startRazorpayCheckout_(plan, btn));
  card.appendChild(btn);
  return card;
}

async function startRazorpayCheckout_(plan, triggerBtn){
  if(!window.Razorpay){
    toast('Payment system still loading — try again in a second', true);
    return;
  }
  triggerBtn.disabled = true;
  const originalLabel = triggerBtn.textContent;
  triggerBtn.textContent = 'Preparing checkout…';

  try{
    const orderRes = await fetch(LEADERBOARD_API_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'createOrder', plan, googleId: STATE.leaderboardUser.googleId, email: STATE.leaderboardUser.email })
    });
    const orderJson = await orderRes.json();
    if(!orderJson.ok){
      toast(orderJson.error || 'Could not start checkout', true);
      triggerBtn.disabled = false;
      triggerBtn.textContent = originalLabel;
      return;
    }

    const rzp = new Razorpay({
      key: orderJson.keyId,
      amount: orderJson.amount,
      currency: orderJson.currency,
      order_id: orderJson.orderId,
      name: 'Original Mode — Project 180',
      description: (plan==='yearly'?'Yearly':'Monthly') + ' Premium',
      prefill: { name: STATE.leaderboardUser.name, email: STATE.leaderboardUser.email },
      theme: { color: '#FFB800' },
      handler: async function(response){
        triggerBtn.textContent = 'Verifying payment…';
        try{
          const verifyRes = await fetch(LEADERBOARD_API_URL, {
            method:'POST',
            headers:{'Content-Type':'text/plain;charset=utf-8'},
            body: JSON.stringify({
              action:'verifyPayment',
              razorpay_order_id: response.razorpay_order_id,
              razorpay_payment_id: response.razorpay_payment_id,
              razorpay_signature: response.razorpay_signature,
              googleId: STATE.leaderboardUser.googleId,
              email: STATE.leaderboardUser.email,
              plan: plan
            })
          });
          const verifyJson = await verifyRes.json();
          if(verifyJson.ok){
            toast('Premium unlocked! 🎉');
            await ensureUserStatusLoaded(true);
            navigateTo('home');
          } else {
            toast(verifyJson.error || 'Payment verification failed', true);
          }
        }catch(e){
          toast('Payment went through, but verification failed to reach the server. Contact support with your payment ID: ' + response.razorpay_payment_id, true);
        }
        triggerBtn.disabled = false;
        triggerBtn.textContent = originalLabel;
      },
      modal: {
        ondismiss: function(){
          triggerBtn.disabled = false;
          triggerBtn.textContent = originalLabel;
        }
      }
    });
    rzp.open();
  }catch(e){
    toast('Could not reach the payment server', true);
    triggerBtn.disabled = false;
    triggerBtn.textContent = originalLabel;
  }
}

function renderSettings(){
  const root = document.getElementById('sectionSettings');
  root.innerHTML='';
  root.appendChild(el('div',{},[
    el('div',{class:'section-title'}, 'Settings & Data'),
    el('div',{class:'section-sub'}, 'Everything here is stored locally in your browser via LocalStorage. Nothing is sent anywhere.')
  ]));
 
  const grid = el('div',{class:'grid grid-2'});
 
  // Profile / start date
  const profileCard = el('div',{class:'card card-pad'});
  profileCard.appendChild(el('div',{class:'strategy-card-title'}, 'Profile'));
  profileCard.appendChild(el('span',{class:'tooltip-label'}, 'Your Name'));
  const nameInput = el('input',{type:'text', placeholder:'Your name'});
  nameInput.value = STATE.settings.name || '';
  nameInput.addEventListener('input', ()=>{ STATE.settings.name = nameInput.value; saveState(); });
  profileCard.appendChild(nameInput);
 
  profileCard.appendChild(el('span',{class:'tooltip-label', style:'margin-top:14px;'}, 'Project Start Date'));
  const dateInput = el('input',{type:'text', placeholder:'YYYY-MM-DD'});
  dateInput.value = STATE.startDate;
  dateInput.addEventListener('change', ()=>{
    if(/^\d{4}-\d{2}-\d{2}$/.test(dateInput.value)){
      STATE.startDate = dateInput.value; saveState(); refreshTopbar(); toast('Start date updated');
    } else { toast('Use format YYYY-MM-DD', true); }
  });
  profileCard.appendChild(dateInput);
  grid.appendChild(profileCard);
 
  // Data management
  const dataCard = el('div',{class:'card card-pad'});
  dataCard.appendChild(el('div',{class:'strategy-card-title'}, 'Data Management'));
  dataCard.appendChild(el('p',{style:'font-size:12.5px;color:var(--text-secondary);margin-bottom:14px;'},
    'Export your progress as a backup file, import a previous backup, or reset everything to start fresh.'));
 
  const exportBtn2 = el('button',{class:'btn btn-secondary', style:'width:100%;justify-content:center;margin-bottom:8px;'}, '⬇ Export Progress (JSON)');
  exportBtn2.addEventListener('click', exportProgress);
  dataCard.appendChild(exportBtn2);
 
  const importLabel = el('label',{class:'btn btn-secondary', style:'width:100%;justify-content:center;margin-bottom:8px;display:flex;cursor:pointer;'}, '⬆ Import Progress');
  const importInput = el('input',{type:'file', accept:'.json', style:'display:none;'});
  importInput.addEventListener('change', handleImportFile);
  importLabel.appendChild(importInput);
  dataCard.appendChild(importLabel);
 
  const backupBtn = el('button',{class:'btn btn-secondary', style:'width:100%;justify-content:center;margin-bottom:8px;'}, '💾 Save Manual Backup');
  backupBtn.addEventListener('click', ()=>{ saveState(); toast('Backup saved to LocalStorage'); });
  dataCard.appendChild(backupBtn);
 
  const resetBtn = el('button',{class:'btn btn-danger', style:'width:100%;justify-content:center;'}, '⚠ Reset All Progress');
  resetBtn.addEventListener('click', ()=>{
    if(confirm('This will permanently erase ALL progress — every day, project, journal entry, and note. Continue?')){
      if(confirm('Are you absolutely sure? This cannot be undone.')){
        STATE = defaultState();
        saveState();
        toast('All progress reset');
        navigateTo('home');
      }
    }
  });
  dataCard.appendChild(resetBtn);
  grid.appendChild(dataCard);
 
  root.appendChild(grid);
 
  // Storage stats
  const storageSize = new Blob([localStorage.getItem(STORAGE_KEY)||'']).size;
  root.appendChild(el('div',{class:'card card-pad', style:'margin-top:16px;'},[
    el('div',{class:'strategy-card-title'}, 'Storage'),
    el('div',{style:'font-size:12.5px;color:var(--text-secondary);'}, 'Currently using ~'+(storageSize/1024).toFixed(1)+' KB of LocalStorage.')
  ]));
 
  // Data import system (paste raw data)
  root.appendChild(el('div',{class:'card card-pad', style:'margin-top:16px;'},[
    el('div',{class:'strategy-card-title'}, 'Raw Data Import'),
    el('p',{style:'font-size:12.5px;color:var(--text-secondary);margin-bottom:10px;'},
      'All 180 days of daily project data and the full 10-skill knowledge vault are already loaded into this app. If you ever want to layer in additional notes from another export, use Import Progress above with a previously exported JSON file.')
  ]));
}
 
function exportProgress(){
  const data = JSON.stringify(STATE, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = el('a',{href:url, download:'project180-backup-'+new Date().toISOString().slice(0,10)+'.json'});
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  toast('Progress exported');
}
 
function handleImportFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt)=>{
    try{
      const imported = JSON.parse(evt.target.result);
      if(!imported || typeof imported !== 'object') throw new Error('bad format');
      if(confirm('Import this backup? It will replace your current progress.')){
        STATE = Object.assign(defaultState(), imported);
        saveState();
        toast('Progress imported');
        navigateTo('home');
      }
    }catch(err){
      toast('Invalid backup file', true);
    }
  };
  reader.readAsText(file);
}
